<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating A Nerd Simulator</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>

<header>
    <h1>Dating A Nerd Simulator</h1>
    <p class="tagline">Meet a date from nekos.best. they speak only in quotes because they're nerds.</p>
</header>

<main id="main-content" class="content-grid-container">

    <!-- SECTION 1: the date (API 1 - nekos.best) -->
    <section class="date-section" aria-labelledby="date-heading">
        <h2 id="date-heading" class="visually-hidden">Your date</h2>
        <div class="imageContainer">
            <div class="Button-Grid" role="group" aria-label="Choose the type of date">
                <button type="button" id="waifu">Waifu</button>
                <button type="button" id="husbando">Husbando</button>
            </div>
            <img class="loveInterest hidden" alt="Your date" width="300" height="300">
            <p class="dateStatus" role="status" aria-live="polite">Finding your date...</p>
            <button type="button" id="nextDate">Next Date</button>
        </div>
    </section>

    <!-- SECTION 2: the chat (API 2 - API Ninjas Quotes) -->
    <section class="chat-section" aria-labelledby="chat-heading">
        <h2 id="chat-heading" class="visually-hidden">Conversation</h2>
        <!-- Chat bubbles are created in JavaScript (js/ui.js). -->
        <div class="messageContainer" role="log" aria-live="polite" aria-label="Conversation with your date"></div>
        <form class="sendRow" action="#">
            <label for="sendMessage" class="visually-hidden">Type a message to your date</label>
            <input type="text" id="sendMessage" placeholder="Enter a message." autocomplete="off">
            <button type="submit" id="sendButton">Send</button>
        </form>
    </section>

</main>

<footer>
    <img id="evelogo" src="https://drive.google.com/thumbnail?id=1sXwmHxx5nIBIwUbatY57YSNZJ_glHuT7&sz=w1920" alt="Eve Panzarino's logo">
    <p>Eve Panzarino</p>
</footer>

<script type="module" src="js/main.js"></script>
</body>
</html>
